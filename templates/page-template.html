<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Title</title>
  <meta name="description" content="Short description for the page.">
</head>
<body>
  <main>
    <article>
      <header>
        <p>Category</p>
        <h1>Headline</h1>
        <p>Byline · Date</p>
      </header>

      <section>
        <p>Intro paragraph goes here.</p>
      </section>

      <section>
        <h2>Section heading</h2>
        <p>Body copy goes here.</p>
      </section>

      <!-- Standard in-article image (copy the .article-figure CSS from
           en/toit-vert-development/index.html). Image file lives in /images/,
           alt text and credit come from the story's Notion row. -->
      <figure class="article-figure">
        <img src="/images/story-slug.jpg" alt="One-sentence description of the image.">
        <figcaption>Caption explaining what the reader is looking at. <span class="credit">Photo: The Ormstown Observer.</span></figcaption>
      </figure>
    </article>
  </main>
</body>
</html>
